<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>燕园调查局 | 100天攻克北大社会学</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .lecture-scroll::-webkit-scrollbar { width: 5px; }
        .lecture-scroll::-webkit-scrollbar-thumb { background: #8b0000; }
    </style>
</head>
<body class="bg-black text-gray-200 h-screen flex flex-col overflow-hidden">
    <nav class="p-4 bg-gray-900 border-b border-red-900 flex justify-between">
        <div class="font-bold text-red-600 tracking-widest">PKU SOC BUREAU - STUDY MODE</div>
        <div id="progress-bar" class="text-xs">当前进度: Day 01</div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-2/3 p-8 overflow-y-auto lecture-scroll bg-neutral-950">
            <div id="lecture-content">
                <h1 id="day-title" class="text-3xl font-bold text-red-500 mb-6 border-b border-red-800 pb-2"></h1>
                <div id="lecture-body" class="prose prose-invert max-w-none">
                    </div>
                <div class="mt-8 p-4 bg-red-900 bg-opacity-20 border border-red-900">
                    <p class="text-sm">⚠️ 系统提示：请仔细研读上述考点。阅读完成后，点击下方按钮开启今日“田野调查”解谜。</p>
                    <button onclick="unlockChallenge()" class="mt-4 px-8 py-2 bg-red-700 hover:bg-red-600 rounded font-bold">我已学完，进入实战</button>
                </div>
            </div>
        </section>

        <section class="w-1/3 p-6 bg-gray-900 border-l border-red-900 relative">
            <div id="lock-overlay" class="absolute inset-0 z-20 bg-black bg-opacity-80 flex flex-col items-center justify-center text-center p-6">
                <span class="text-5xl mb-4">🔒</span>
                <p class="text-red-500 font-bold">区域锁定</p>
                <p class="text-xs text-gray-500 mt-2">请先完成左侧【深度精讲】内容的学习</p>
            </div>

            <div id="challenge-area" class="hidden">
                <h2 class="text-xl font-bold text-red-600 mb-4">调查任务：时空裂缝</h2>
                <div id="puzzle-box" class="space-y-6 text-sm">
                    </div>
            </div>
        </section>
    </main>

    <script src="assets/js/database.js"></script>
    <script>
        let currentDay = "day_01";

        function init() {
            const data = STUDY_DB[currentDay];
            document.getElementById('day-title').innerText = data.title;
            
            // 渲染精讲
            let html = data.lecture.deep_dive;
            html += `<h3 class='mt-6 text-red-500'>核心名词解释</h3><dl class='space-y-4'>`;
            data.lecture.concept.forEach(c => {
                html += `<dt class='font-bold text-yellow-600'>【${c.term}】</dt><dd class='text-gray-400 pl-4'>${c.definition}</dd>`;
            });
            html += `</dl>`;
            document.getElementById('lecture-body').innerHTML = html;
        }

        function unlockChallenge() {
            document.getElementById('lock-overlay').classList.add('hidden');
            document.getElementById('challenge-area').classList.remove('hidden');
            renderPuzzle();
        }

        function renderPuzzle() {
            const puzzles = STUDY_DB[currentDay].challenge.puzzles;
            let html = "";
            puzzles.forEach((p, idx) => {
                html += `<div class='p-4 bg-black border border-gray-700 rounded'>
                    <p class='mb-3 font-bold text-gray-100'>${p.question}</p>`;
                p.options.forEach(opt => {
                    html += `<button onclick="checkAnswer(${opt.isCorrect}, '${opt.feedback}')" 
                             class='block w-full text-left p-2 mb-2 hover:bg-red-900 border border-gray-800 rounded transition text-xs'>
                             ${opt.text}</button>`;
                });
                html += `</div>`;
            });
            document.getElementById('puzzle-box').innerHTML = html;
        }

        function checkAnswer(isCorrect, feedback) {
            alert(isCorrect ? "【成功】 " + feedback : "【失败】 " + feedback);
        }

        window.onload = init;
    </script>
</body>
</html>
